[barlib/i3]
title=i3 barlib for luastatus
suggests=pkg_i3wm
depends=so:lib_yajl
description=<<__EOF__
<*> This package contains the i3 barlib for luastatus.
<*> This barlib talks to i3bar (part of the i3 window manager), or any other
    program compatible with it on the protocol level.
<*> This package also provides luastatus-i3-wrapper script.
<--->
<*> For more information, see "man 7 luastatus-barlib-i3".
__EOF__

[barlib/dwm]
title=dwm barlib for luastatus
suggests=pkg_dwm
depends=so:lib_xcb
description=<<__EOF__
<*> This package contains the dwm barlib for luastatus.
<*> It updates the name of the root window.
<*> Although named dwm, it can really work with any program that outputs the
    root window name somewhere.
<--->
<*> For more information, see "man 7 luastatus-barlib-dwm".
__EOF__

[barlib/lemonbar]
title=lemonbar barlib for luastatus
suggests=pkg_lemonbar
description=<<__EOF__
<*> This package contains the lemonbar barlib for luastatus.
<*> The package also provides luastatus-lemonbar-launcher script.
<--->
<*> For more information, see "man 7 luastatus-barlib-lemonbar".
__EOF__

[barlib/stdout]
title=stdout barlib for luastatus
suggests=pkg_dzen2 | pkg_xmobar | pkg_yabar | pkg_dvtm
description=<<__EOF__
<*> This is stdout barlib for luastatus.
<*> It simply outputs lines to given file descriptor.
<*> It can be used with, for example, dzen2, xmobar, yabar, dvtm.
<*> This package also provides luastatus-stdout-wrapper script.
<--->
<*> For more information, see "man 7 luastatus-barlib-stdout".
__EOF__

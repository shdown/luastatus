[%/luastatus]
title=Universal status bar content generator
depends=so:lib_lua
description=<<__EOF__
<*> luastatus is a universal status bar content generator.
<*> It allows the user to configure the way the data from event sources is
    processed and shown, with Lua.
<*> Its main feature is that the content can be updated immediately as some
    event occurs.
<--->
<*> This package contains the main binary and the following plugins: ${__main_pkg_plugins__}.
__EOF__
